version: '3.8'

services:
  omni-scan:
    build: .
    container_name: omni-scan
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./omni_scan.db:/app/omni_scan.db
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_THEME_BASE=dark
    cap_add:
      - NET_ADMIN
    networks:
      - omni-scan-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  omni-scan-net:
    driver: bridge
